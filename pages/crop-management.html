<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crop Management — AgriMarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <script src="/main.js"></script>
    <script src="/farmer.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <!-- Modal -->
    <div class="modal-overlay" id="cropModal">
      <div class="modal">
        <h3 id="modalTitle">Add Crop</h3>
        <form onsubmit="saveCrop(event)">
          <input type="hidden" id="editId" />
          <div class="form-group">
            <label>Crop Name</label>
            <input type="text" id="cropName" required placeholder="e.g. Maize, Tomatoes, Cassava" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Variety</label>
              <input type="text" id="cropVariety" placeholder="e.g. Local, Hybrid" />
            </div>
            <div class="form-group">
              <label>Region</label>
              <select id="cropRegion">
                <option>Greater Accra</option><option>Ashanti</option><option>Western</option>
                <option>Eastern</option><option>Central</option><option>Northern</option>
                <option>Volta</option><option>Brong-Ahafo</option><option>Upper East</option><option>Upper West</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Field Size (acres)</label>
              <input type="number" id="cropSize" required min="0" step="0.1" placeholder="0.0" />
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="cropStatus">
                <option>Planted</option><option>Growing</option><option>Ready to Harvest</option><option>Harvested</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Planting Date</label>
              <input type="date" id="cropPlanted" />
            </div>
            <div class="form-group">
              <label>Expected Harvest</label>
              <input type="date" id="cropHarvest" />
            </div>
          </div>
          <div class="form-group">
            <label>Crop Image</label>
            <div class="img-upload-area" id="imgUploadArea" onclick="document.getElementById('cropImage').click()">
              <div id="imgPlaceholder">
                <div style="font-size:2rem;opacity:0.3;margin-bottom:0.5rem">📷</div>
                <p class="text-soft text-sm">Click to upload an image</p>
                <p class="text-muted text-sm">JPG, PNG up to 2MB</p>
              </div>
              <div id="imgPreview" style="display:none">
                <img id="imgPreviewEl" src="" alt="Preview" />
                <button type="button" class="btn btn-ghost btn-sm" onclick="removeImage(event)">Remove Image</button>
              </div>
            </div>
            <input type="file" id="cropImage" accept="image/*" style="display:none" onchange="handleImageUpload(event)" />
          </div>
          <div class="form-group">
            <label>Notes (optional)</label>
            <textarea id="cropNotes" rows="2" placeholder="Soil type, irrigation, fertilizer, etc."></textarea>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Crop</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      let currentImageData = '';

      const content = `
        <div class="flex-between mb-3">
          <p class="text-soft">Track and manage your crop plantings</p>
          <button class="btn btn-primary" onclick="openModal()">+ Add Crop</button>
        </div>
        <div class="grid grid-4 mb-4" id="cropStats"></div>
        <div id="cropList"></div>
      `;
      initFarmerPage('/pages/crop-management.html', 'Crop Management', content);

      renderCrops();

      function renderCrops() {
        const crops = Store.crops();

        // Stats
        const totalCrops = crops.length;
        const totalAcreage = crops.reduce((s, c) => s + (c.size || 0), 0);
        const growing = crops.filter(c => c.status === 'Growing').length;
        const ready = crops.filter(c => c.status === 'Ready to Harvest').length;

        document.getElementById('cropStats').innerHTML = `
          <div class="card stat-card"><div class="stat-icon" style="background:var(--primary-100)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--primary-600)" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div><div><div class="stat-value">${totalCrops}</div><div class="stat-label">Total Crops</div></div></div>
          <div class="card stat-card"><div class="stat-icon" style="background:var(--accent-100)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-600)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg></div><div><div class="stat-value">${totalAcreage}</div><div class="stat-label">Total Acres</div></div></div>
          <div class="card stat-card"><div class="stat-icon" style="background:var(--success-50)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--success-600)" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><div><div class="stat-value">${growing}</div><div class="stat-label">Growing</div></div></div>
          <div class="card stat-card"><div class="stat-icon" style="background:var(--warning-50)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--warning-600)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div><div><div class="stat-value">${ready}</div><div class="stat-label">Ready to Harvest</div></div></div>
        `;

        // Cards
        if (crops.length === 0) {
          document.getElementById('cropList').innerHTML = emptyState('No crops added yet', 'Start tracking your crop plantings by adding your first crop.', null, null);
        } else {
          document.getElementById('cropList').innerHTML = `
            <div class="grid grid-3">
              ${crops.map(crop => `
                <div class="card card-hover" style="padding:0;overflow:hidden">
                  ${crop.image
                    ? `<img src="${crop.image}" alt="${crop.name}" style="width:100%;height:160px;object-fit:cover" />`
                    : `<div style="width:100%;height:160px;background:var(--primary-50);display:flex;align-items:center;justify-content:center;font-size:3rem;opacity:0.2">🌱</div>`}
                  <div style="padding:1rem">
                    <div class="flex-between mb-1">
                      <h4 style="font-size:1rem">${crop.name}</h4>
                      <span class="badge ${crop.status==='Ready to Harvest'?'badge-warning':crop.status==='Harvested'?'badge-success':'badge-primary'}">${crop.status}</span>
                    </div>
                    <p class="text-sm text-soft">${crop.variety || ''} · ${crop.size} acres · ${crop.region}</p>
                    ${crop.planted ? `<p class="text-sm text-muted mt-1">Planted: ${crop.planted}</p>` : ''}
                    ${crop.harvest ? `<p class="text-sm text-muted">Harvest: ${crop.harvest}</p>` : ''}
                    ${crop.notes ? `<p class="text-sm text-soft mt-1" style="border-top:1px solid var(--border);padding-top:0.5rem">${crop.notes}</p>` : ''}
                    <div class="flex gap-1 mt-2">
                      <button class="btn btn-ghost btn-sm" onclick="editCrop(${crop.id})">Edit</button>
                      <button class="btn btn-ghost btn-sm" style="color:var(--error-500)" onclick="deleteCrop(${crop.id})">Delete</button>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          `;
        }
      }

      function openModal() {
        document.getElementById('editId').value = '';
        document.getElementById('modalTitle').textContent = 'Add Crop';
        document.getElementById('cropName').value = '';
        document.getElementById('cropVariety').value = '';
        document.getElementById('cropRegion').value = 'Greater Accra';
        document.getElementById('cropSize').value = '';
        document.getElementById('cropStatus').value = 'Planted';
        document.getElementById('cropPlanted').value = '';
        document.getElementById('cropHarvest').value = '';
        document.getElementById('cropNotes').value = '';
        currentImageData = '';
        resetImageUpload();
        document.getElementById('cropModal').classList.add('show');
      }

      function closeModal() {
        document.getElementById('cropModal').classList.remove('show');
      }

      function editCrop(id) {
        const crops = Store.crops();
        const crop = crops.find(c => c.id === id);
        if (!crop) return;
        document.getElementById('editId').value = crop.id;
        document.getElementById('modalTitle').textContent = 'Edit Crop';
        document.getElementById('cropName').value = crop.name;
        document.getElementById('cropVariety').value = crop.variety || '';
        document.getElementById('cropRegion').value = crop.region || 'Greater Accra';
        document.getElementById('cropSize').value = crop.size;
        document.getElementById('cropStatus').value = crop.status || 'Planted';
        document.getElementById('cropPlanted').value = crop.planted || '';
        document.getElementById('cropHarvest').value = crop.harvest || '';
        document.getElementById('cropNotes').value = crop.notes || '';
        currentImageData = crop.image || '';
        if (currentImageData) {
          document.getElementById('imgPlaceholder').style.display = 'none';
          document.getElementById('imgPreview').style.display = 'block';
          document.getElementById('imgPreviewEl').src = currentImageData;
        } else {
          resetImageUpload();
        }
        document.getElementById('cropModal').classList.add('show');
      }

      function deleteCrop(id) {
        if (!confirm('Delete this crop?')) return;
        Store.saveCrops(Store.crops().filter(c => c.id !== id));
        toast('Crop deleted');
        renderCrops();
      }

      function saveCrop(e) {
        e.preventDefault();
        const crops = Store.crops();
        const editId = document.getElementById('editId').value;
        const data = {
          name: document.getElementById('cropName').value,
          variety: document.getElementById('cropVariety').value,
          region: document.getElementById('cropRegion').value,
          size: parseFloat(document.getElementById('cropSize').value),
          status: document.getElementById('cropStatus').value,
          planted: document.getElementById('cropPlanted').value,
          harvest: document.getElementById('cropHarvest').value,
          notes: document.getElementById('cropNotes').value,
          image: currentImageData || '',
        };
        if (editId) {
          const crop = crops.find(c => c.id === parseInt(editId));
          Object.assign(crop, data);
          toast('Crop updated');
        } else {
          data.id = Date.now();
          crops.push(data);
          toast('Crop added');
        }
        Store.saveCrops(crops);
        closeModal();
        renderCrops();
      }

      // ---- Image upload ----
      function handleImageUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) {
          toast('Image too large. Max 2MB.');
          return;
        }
        const reader = new FileReader();
        reader.onload = function(ev) {
          currentImageData = ev.target.result;
          document.getElementById('imgPlaceholder').style.display = 'none';
          document.getElementById('imgPreview').style.display = 'block';
          document.getElementById('imgPreviewEl').src = currentImageData;
        };
        reader.readAsDataURL(file);
      }

      function removeImage(e) {
        e.stopPropagation();
        currentImageData = '';
        document.getElementById('cropImage').value = '';
        resetImageUpload();
      }

      function resetImageUpload() {
        document.getElementById('imgPlaceholder').style.display = 'block';
        document.getElementById('imgPreview').style.display = 'none';
        document.getElementById('imgPreviewEl').src = '';
      }
    </script>
  </body>
</html>
