<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Products — AgriMarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <script src="/main.js"></script>
    <script src="/admin.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <script>
      let searchQuery = '';
      let categoryFilter = 'all';

      const content = `
        <div class="flex-between mb-3" style="flex-wrap:wrap;gap:1rem">
          <p class="text-soft">Browse and manage all marketplace products</p>
          <div class="flex gap-1" style="flex-wrap:wrap;align-items:center">
            <input type="text" id="productSearch" placeholder="Search products..." style="padding:0.5rem 0.75rem;border:1px solid var(--border);border-radius:var(--radius);font-size:0.875rem;min-width:200px" oninput="onSearch(event)" />
            <select id="categoryFilter" style="padding:0.5rem 0.75rem;border:1px solid var(--border);border-radius:var(--radius);font-size:0.875rem" onchange="onCategoryFilter(event)">
              <option value="all">All Categories</option>
              ${CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('')}
            </select>
          </div>
        </div>
        <div id="productGrid"></div>
      `;
      initAdminPage('/pages/manage-products.html', 'Manage Products', content);

      renderProducts();

      function onSearch(e) {
        searchQuery = e.target.value.toLowerCase();
        renderProducts();
      }

      function onCategoryFilter(e) {
        categoryFilter = e.target.value;
        renderProducts();
      }

      function renderProducts() {
        let products = [...PRODUCTS];

        if (categoryFilter !== 'all') {
          products = products.filter(p => p.category === categoryFilter);
        }

        if (searchQuery) {
          products = products.filter(p =>
            (p.name || '').toLowerCase().includes(searchQuery) ||
            (p.seller || '').toLowerCase().includes(searchQuery)
          );
        }

        if (products.length === 0) {
          document.getElementById('productGrid').innerHTML = emptyState('No products found', 'No products match your search or filter. Try adjusting your criteria.', null, null);
          return;
        }

        document.getElementById('productGrid').innerHTML = `
          <div class="grid grid-4">
            ${products.map(p => `
              <div class="card card-hover" style="padding:0;overflow:hidden">
                <img src="${PEXELS(p.img, 300, 200)}" alt="${p.name}" style="width:100%;height:160px;object-fit:cover" />
                <div style="padding:1rem">
                  <div class="flex-between mb-1">
                    <h4 style="font-size:0.95rem">${p.name}</h4>
                    <span class="badge badge-primary" style="font-size:0.7rem">${p.category}</span>
                  </div>
                  <div style="display:flex;align-items:center;gap:0.25rem;margin-bottom:0.5rem">
                    <span style="color:var(--accent-500)">${stars(p.rating)}</span>
                    <span class="text-sm text-soft">${p.rating}</span>
                  </div>
                  <div class="flex-between mb-1">
                    <span style="font-weight:700;font-size:1.1rem;color:var(--primary-600)">${fmtMoney(p.price)}</span>
                    <span class="text-sm text-soft">/ ${p.unit}</span>
                  </div>
                  <p class="text-sm text-soft" style="margin-bottom:0.25rem">by ${p.seller}</p>
                  <div class="flex-between" style="margin-top:0.5rem;padding-top:0.5rem;border-top:1px solid var(--border)">
                    <span class="text-sm text-soft">Stock</span>
                    <span class="badge ${p.stock < 20 ? 'badge-warning' : 'badge-success'}">${p.stock} ${p.unit}</span>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }
    </script>
  </body>
</html>
