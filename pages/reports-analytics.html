<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reports & Analytics — AgriMarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <script src="/main.js"></script>
    <script src="/farmer.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <script>
      const content = `
        <p class="text-soft mb-3">Insights and analytics from your farm data</p>

        <div class="grid grid-4 mb-4" id="reportStats"></div>

        <div class="grid grid-2 mb-4">
          <div class="card">
            <h3 style="margin-bottom:1rem">Income by Month</h3>
            <div id="incomeChart"></div>
          </div>
          <div class="card">
            <h3 style="margin-bottom:1rem">Expenses by Category</h3>
            <div id="expenseDonut"></div>
          </div>
        </div>

        <div class="grid grid-2">
          <div class="card">
            <h3 style="margin-bottom:1rem">Income Breakdown</h3>
            <div id="incomeBreakdown"></div>
          </div>
          <div class="card">
            <h3 style="margin-bottom:1rem">Expense Breakdown</h3>
            <div id="expenseBreakdown"></div>
          </div>
        </div>
      `;
      initFarmerPage('/pages/reports-analytics.html', 'Reports & Analytics', content);

      renderReports();

      function renderReports() {
        const income = Store.income();
        const expenses = Store.expenses();
        const crops = Store.crops();
        const livestock = Store.livestock();

        const totalIncome = income.reduce((s, i) => s + (i.amount || 0), 0);
        const totalExpenses = expenses.reduce((s, e) => s + (e.amount || 0), 0);
        const netProfit = totalIncome - totalExpenses;

        // Summary stats
        document.getElementById('reportStats').innerHTML = `
          <div class="card stat-card"><div class="stat-icon" style="background:var(--success-50)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--success-600)" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div><div><div class="stat-value">${fmtMoney(totalIncome)}</div><div class="stat-label">Total Income</div></div></div>
          <div class="card stat-card"><div class="stat-icon" style="background:var(--error-50)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--error-500)" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div><div><div class="stat-value">${fmtMoney(totalExpenses)}</div><div class="stat-label">Total Expenses</div></div></div>
          <div class="card stat-card"><div class="stat-icon" style="background:${netProfit >= 0 ? 'var(--primary-100)' : 'var(--warning-50)'}"><svg viewBox="0 0 24 24" fill="none" stroke="${netProfit >= 0 ? 'var(--primary-600)' : 'var(--warning-600)'}" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg></div><div><div class="stat-value" style="color:${netProfit >= 0 ? 'var(--primary-600)' : 'var(--warning-600)'}">${fmtMoney(netProfit)}</div><div class="stat-label">Net Profit</div></div></div>
          <div class="card stat-card"><div class="stat-icon" style="background:var(--accent-100)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-600)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg></div><div><div class="stat-value">${crops.length + livestock.length}</div><div class="stat-label">Farm Assets</div></div></div>
        `;

        renderIncomeChart(income);
        renderExpenseDonut(expenses);
        renderIncomeBreakdown(income);
        renderExpenseBreakdown(expenses);
      }

      function renderIncomeChart(income) {
        if (income.length === 0) {
          document.getElementById('incomeChart').innerHTML = emptyState('No income data', 'Add income records to see monthly trends.', '/pages/expenses-income.html', 'Add Income');
          return;
        }

        // Group by month
        const months = {};
        income.forEach(item => {
          if (!item.date) return;
          const d = new Date(item.date);
          if (isNaN(d)) return;
          const key = d.toLocaleDateString('en-GH', { month: 'short' });
          months[key] = (months[key] || 0) + (item.amount || 0);
        });

        const entries = Object.entries(months);
        if (entries.length === 0) {
          document.getElementById('incomeChart').innerHTML = emptyState('No income data', 'Add income records to see monthly trends.', '/pages/expenses-income.html', 'Add Income');
          return;
        }

        const maxVal = Math.max(...entries.map(e => e[1]), 1);

        document.getElementById('incomeChart').innerHTML = `
          <div class="bar-chart">
            ${entries.map(([month, val]) => {
              const height = Math.max((val / maxVal) * 100, 2);
              return `
                <div class="bar-col">
                  <div style="font-size:0.7rem;color:var(--text-soft);margin-bottom:0.25rem">${fmtMoney(val)}</div>
                  <div class="bar" style="height:${height}%"></div>
                  <div class="bar-label">${month}</div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }

      function renderExpenseDonut(expenses) {
        if (expenses.length === 0) {
          document.getElementById('expenseDonut').innerHTML = emptyState('No expense data', 'Add expense records to see category breakdown.', '/pages/expenses-income.html', 'Add Expense');
          return;
        }

        // Group by category
        const categories = {};
        expenses.forEach(e => {
          const cat = e.category || 'Other';
          categories[cat] = (categories[cat] || 0) + (e.amount || 0);
        });

        const entries = Object.entries(categories);
        const total = entries.reduce((s, e) => s + e[1], 0);
        if (total === 0) {
          document.getElementById('expenseDonut').innerHTML = emptyState('No expense data', 'Add expense records to see category breakdown.', '/pages/expenses-income.html', 'Add Expense');
          return;
        }

        // Build donut using conic-gradient
        const colors = ['#1a7a3e', '#d9a900', '#28a745', '#dc3545', '#6c757d', '#3a9d62'];
        let gradientParts = [];
        let cumulative = 0;
        entries.forEach(([cat, val], i) => {
          const pct = (val / total) * 100;
          gradientParts.push(`${colors[i % colors.length]} ${cumulative}% ${cumulative + pct}%`);
          cumulative += pct;
        });

        document.getElementById('expenseDonut').innerHTML = `
          <div style="display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap">
            <div class="donut" style="background:conic-gradient(${gradientParts.join(',')});position:relative">
              <div style="position:absolute;inset:20px;background:var(--white);border-radius:50%;display:flex;align-items:center;justify-content:center">
                <div class="donut-center">
                  <div class="val">${fmtMoney(total)}</div>
                  <div class="lbl">Total</div>
                </div>
              </div>
            </div>
            <div style="flex:1;min-width:150px">
              ${entries.map(([cat, val], i) => `
                <div class="summary-row">
                  <span style="display:flex;align-items:center;gap:0.5rem">
                    <span style="width:12px;height:12px;border-radius:3px;background:${colors[i % colors.length]};display:inline-block"></span>
                    <span class="text-sm">${cat}</span>
                  </span>
                  <span class="text-sm font-semibold">${fmtMoney(val)}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      function renderIncomeBreakdown(income) {
        if (income.length === 0) {
          document.getElementById('incomeBreakdown').innerHTML = emptyState('No income data', 'Income breakdown will appear here once you add records.', null, null);
          return;
        }

        // Group by source
        const sources = {};
        income.forEach(i => {
          const src = i.source || 'Other';
          sources[src] = (sources[src] || 0) + (i.amount || 0);
        });

        const total = Object.values(sources).reduce((s, v) => s + v, 0);

        document.getElementById('incomeBreakdown').innerHTML = `
          ${Object.entries(sources).map(([src, val]) => {
            const pct = total > 0 ? ((val / total) * 100).toFixed(1) : 0;
            return `
              <div class="summary-row">
                <span class="text-sm font-semibold">${src}</span>
                <span class="text-sm">${fmtMoney(val)} (${pct}%)</span>
              </div>
            `;
          }).join('')}
          <div class="summary-total">
            <span>Total Income</span>
            <span style="color:var(--success-600)">${fmtMoney(total)}</span>
          </div>
        `;
      }

      function renderExpenseBreakdown(expenses) {
        if (expenses.length === 0) {
          document.getElementById('expenseBreakdown').innerHTML = emptyState('No expense data', 'Expense breakdown will appear here once you add records.', null, null);
          return;
        }

        // Group by category
        const categories = {};
        expenses.forEach(e => {
          const cat = e.category || 'Other';
          categories[cat] = (categories[cat] || 0) + (e.amount || 0);
        });

        const total = Object.values(categories).reduce((s, v) => s + v, 0);

        document.getElementById('expenseBreakdown').innerHTML = `
          ${Object.entries(categories).map(([cat, val]) => {
            const pct = total > 0 ? ((val / total) * 100).toFixed(1) : 0;
            return `
              <div class="summary-row">
                <span class="text-sm font-semibold">${cat}</span>
                <span class="text-sm">${fmtMoney(val)} (${pct}%)</span>
              </div>
            `;
          }).join('')}
          <div class="summary-total">
            <span>Total Expenses</span>
            <span style="color:var(--error-500)">${fmtMoney(total)}</span>
          </div>
        `;
      }
    </script>
  </body>
</html>
