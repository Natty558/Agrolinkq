<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory — AgriMarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <script src="/main.js"></script>
    <script src="/farmer.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <!-- Modal -->
    <div class="modal-overlay" id="invModal">
      <div class="modal">
        <h3 id="modalTitle">Add Inventory Item</h3>
        <form onsubmit="saveItem(event)">
          <input type="hidden" id="editId" />
          <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="itemName" required placeholder="e.g. Fresh Tomatoes" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Category</label>
              <select id="itemCategory">
                <option>Vegetables</option><option>Grains</option><option>Poultry</option>
                <option>Dairy</option><option>Fruits</option><option>Tubers</option><option>Specialty</option>
              </select>
            </div>
            <div class="form-group">
              <label>Quantity</label>
              <input type="number" id="itemQty" required min="0" placeholder="0" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Unit</label>
              <input type="text" id="itemUnit" required placeholder="e.g. kg, bag, crate" />
            </div>
            <div class="form-group">
              <label>Price (₵)</label>
              <input type="number" id="itemPrice" required min="0" step="0.01" placeholder="0.00" />
            </div>
          </div>
          <div class="form-group">
            <label>Product Image</label>
            <div class="img-upload-area" id="imgUploadArea" onclick="document.getElementById('itemImage').click()">
              <div id="imgPlaceholder">
                <div style="font-size:2rem;opacity:0.3;margin-bottom:0.5rem">📷</div>
                <p class="text-soft text-sm">Click to upload an image</p>
                <p class="text-muted text-sm">JPG, PNG up to 2MB</p>
              </div>
              <div id="imgPreview" style="display:none">
                <img id="imgPreviewEl" src="" alt="Preview" />
                <button type="button" class="btn btn-ghost btn-sm" onclick="removeImage(event)">Remove Image</button>
              </div>
            </div>
            <input type="file" id="itemImage" accept="image/*" style="display:none" onchange="handleImageUpload(event)" />
          </div>
          <div class="form-group">
            <label>Notes (optional)</label>
            <textarea id="itemNotes" rows="2" placeholder="Any additional details..."></textarea>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Item</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      let currentImageData = '';

      const content = `
        <div class="flex-between mb-3">
          <p class="text-soft">Manage your farm inventory and stock levels</p>
          <button class="btn btn-primary" onclick="openModal()">+ Add Item</button>
        </div>
        <div class="grid grid-4 mb-4" id="invStats"></div>
        <div class="card">
          <div id="invTable"></div>
        </div>
      `;
      initFarmerPage('/pages/inventory.html', 'Inventory', content);

      renderInventory();

      function renderInventory() {
        const items = Store.inventory();

        // Stats
        const totalItems = items.length;
        const totalValue = items.reduce((s, i) => s + (i.price * i.qty), 0);
        const lowStock = items.filter(i => i.qty < 10).length;
        const categories = new Set(items.map(i => i.category)).size;

        document.getElementById('invStats').innerHTML = `
          <div class="card stat-card"><div class="stat-icon" style="background:var(--primary-100)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--primary-600)" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><path d="M3 6h18"/></svg></div><div><div class="stat-value">${totalItems}</div><div class="stat-label">Total Items</div></div></div>
          <div class="card stat-card"><div class="stat-icon" style="background:var(--accent-100)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-600)" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div><div><div class="stat-value">${fmtMoney(totalValue)}</div><div class="stat-label">Total Value</div></div></div>
          <div class="card stat-card"><div class="stat-icon" style="background:var(--warning-50)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--warning-600)" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div><div class="stat-value">${lowStock}</div><div class="stat-label">Low Stock</div></div></div>
          <div class="card stat-card"><div class="stat-icon" style="background:var(--success-50)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--success-600)" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/></svg></div><div><div class="stat-value">${categories}</div><div class="stat-label">Categories</div></div></div>
        `;

        // Table
        if (items.length === 0) {
          document.getElementById('invTable').innerHTML = emptyState('No inventory items yet', 'Add your first inventory item to start tracking your stock.', null, null);
        } else {
          document.getElementById('invTable').innerHTML = `
            <div class="table-wrap"><table>
              <thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Qty</th><th>Unit Price</th><th>Total Value</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>
                ${items.map(item => `
                  <tr>
                    <td>
                      ${item.image
                        ? `<img src="${item.image}" style="width:40px;height:40px;border-radius:6px;object-fit:cover" />`
                        : `<div style="width:40px;height:40px;border-radius:6px;background:var(--neutral-100);display:flex;align-items:center;justify-content:center;font-size:1.2rem;opacity:0.3">📷</div>`}
                    </td>
                    <td><strong>${item.name}</strong></td>
                    <td><span class="badge badge-primary">${item.category}</span></td>
                    <td>${item.qty} ${item.unit}</td>
                    <td>${fmtMoney(item.price)}</td>
                    <td>${fmtMoney(item.price * item.qty)}</td>
                    <td>${item.qty < 10 ? '<span class="badge badge-warning">Low</span>' : '<span class="badge badge-success">In Stock</span>'}</td>
                    <td>
                      <button class="btn btn-ghost btn-sm" onclick="editItem(${item.id})">Edit</button>
                      <button class="btn btn-ghost btn-sm" style="color:var(--error-500)" onclick="deleteItem(${item.id})">Delete</button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table></div>
          `;
        }
      }

      function openModal() {
        document.getElementById('editId').value = '';
        document.getElementById('modalTitle').textContent = 'Add Inventory Item';
        document.getElementById('itemName').value = '';
        document.getElementById('itemCategory').value = 'Vegetables';
        document.getElementById('itemQty').value = '';
        document.getElementById('itemUnit').value = '';
        document.getElementById('itemPrice').value = '';
        document.getElementById('itemNotes').value = '';
        currentImageData = '';
        resetImageUpload();
        document.getElementById('invModal').classList.add('show');
      }

      function closeModal() {
        document.getElementById('invModal').classList.remove('show');
      }

      function editItem(id) {
        const items = Store.inventory();
        const item = items.find(i => i.id === id);
        if (!item) return;
        document.getElementById('editId').value = item.id;
        document.getElementById('modalTitle').textContent = 'Edit Inventory Item';
        document.getElementById('itemName').value = item.name;
        document.getElementById('itemCategory').value = item.category;
        document.getElementById('itemQty').value = item.qty;
        document.getElementById('itemUnit').value = item.unit;
        document.getElementById('itemPrice').value = item.price;
        document.getElementById('itemNotes').value = item.notes || '';
        currentImageData = item.image || '';
        if (currentImageData) {
          document.getElementById('imgPlaceholder').style.display = 'none';
          document.getElementById('imgPreview').style.display = 'block';
          document.getElementById('imgPreviewEl').src = currentImageData;
        } else {
          resetImageUpload();
        }
        document.getElementById('invModal').classList.add('show');
      }

      function deleteItem(id) {
        if (!confirm('Delete this inventory item?')) return;
        Store.saveInventory(Store.inventory().filter(i => i.id !== id));
        toast('Item deleted');
        renderInventory();
      }

      function saveItem(e) {
        e.preventDefault();
        const items = Store.inventory();
        const editId = document.getElementById('editId').value;
        const data = {
          name: document.getElementById('itemName').value,
          category: document.getElementById('itemCategory').value,
          qty: parseInt(document.getElementById('itemQty').value),
          unit: document.getElementById('itemUnit').value,
          price: parseFloat(document.getElementById('itemPrice').value),
          notes: document.getElementById('itemNotes').value,
          image: currentImageData || '',
        };
        if (editId) {
          const item = items.find(i => i.id === parseInt(editId));
          Object.assign(item, data);
          toast('Item updated');
        } else {
          data.id = Date.now();
          items.push(data);
          toast('Item added');
        }
        Store.saveInventory(items);
        closeModal();
        renderInventory();
      }

      // ---- Image upload ----
      function handleImageUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) {
          toast('Image too large. Max 2MB.');
          return;
        }
        const reader = new FileReader();
        reader.onload = function(ev) {
          currentImageData = ev.target.result;
          document.getElementById('imgPlaceholder').style.display = 'none';
          document.getElementById('imgPreview').style.display = 'block';
          document.getElementById('imgPreviewEl').src = currentImageData;
        };
        reader.readAsDataURL(file);
      }

      function removeImage(e) {
        e.stopPropagation();
        currentImageData = '';
        document.getElementById('itemImage').value = '';
        resetImageUpload();
      }

      function resetImageUpload() {
        document.getElementById('imgPlaceholder').style.display = 'block';
        document.getElementById('imgPreview').style.display = 'none';
        document.getElementById('imgPreviewEl').src = '';
      }
    </script>
  </body>
</html>
