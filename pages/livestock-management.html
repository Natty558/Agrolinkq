<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livestock Management — AgriMarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <script src="/main.js"></script>
    <script src="/farmer.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <!-- Modal -->
    <div class="modal-overlay" id="livestockModal">
      <div class="modal">
        <h3 id="modalTitle">Add Livestock</h3>
        <form onsubmit="saveLivestock(event)">
          <input type="hidden" id="editId" />
          <div class="form-group">
            <label>Name / Identifier</label>
            <input type="text" id="livestockName" required placeholder="e.g. Herd 1, Pen A, Cattle #5" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Type</label>
              <select id="livestockType">
                <option>Cattle</option><option>Poultry</option><option>Goats</option><option>Sheep</option><option>Pigs</option>
              </select>
            </div>
            <div class="form-group">
              <label>Breed</label>
              <input type="text" id="livestockBreed" placeholder="e.g. N'Dama, Rhode Island Red" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Count</label>
              <input type="number" id="livestockCount" required min="1" placeholder="0" />
            </div>
            <div class="form-group">
              <label>Health Status</label>
              <select id="livestockHealth">
                <option>Healthy</option><option>Treatment</option><option>Vaccination Due</option><option>Sick</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Livestock Image</label>
            <div class="img-upload-area" id="imgUploadArea" onclick="document.getElementById('livestockImage').click()">
              <div id="imgPlaceholder">
                <div style="font-size:2rem;opacity:0.3;margin-bottom:0.5rem">📷</div>
                <p class="text-soft text-sm">Click to upload an image</p>
                <p class="text-muted text-sm">JPG, PNG up to 2MB</p>
              </div>
              <div id="imgPreview" style="display:none">
                <img id="imgPreviewEl" src="" alt="Preview" />
                <button type="button" class="btn btn-ghost btn-sm" onclick="removeImage(event)">Remove Image</button>
              </div>
            </div>
            <input type="file" id="livestockImage" accept="image/*" style="display:none" onchange="handleImageUpload(event)" />
          </div>
          <div class="form-group">
            <label>Notes (optional)</label>
            <textarea id="livestockNotes" rows="2" placeholder="Feeding schedule, medical history, etc."></textarea>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Livestock</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      let currentImageData = '';

      const content = `
        <div class="flex-between mb-3">
          <p class="text-soft">Track and manage your livestock</p>
          <button class="btn btn-primary" onclick="openModal()">+ Add Livestock</button>
        </div>
        <div class="grid grid-4 mb-4" id="livestockStats"></div>
        <div id="livestockList"></div>
      `;
      initFarmerPage('/pages/livestock-management.html', 'Livestock Management', content);

      renderLivestock();

      function renderLivestock() {
        const livestock = Store.livestock();

        // Stats
        const totalAnimals = livestock.reduce((s, l) => s + (l.count || 0), 0);
        const types = new Set(livestock.map(l => l.type)).size;
        const healthy = livestock.filter(l => l.health === 'Healthy').reduce((s, l) => s + (l.count || 0), 0);

        document.getElementById('livestockStats').innerHTML = `
          <div class="card stat-card"><div class="stat-icon" style="background:var(--primary-100)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--primary-600)" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg></div><div><div class="stat-value">${totalAnimals}</div><div class="stat-label">Total Animals</div></div></div>
          <div class="card stat-card"><div class="stat-icon" style="background:var(--accent-100)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-600)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg></div><div><div class="stat-value">${types}</div><div class="stat-label">Livestock Types</div></div></div>
          <div class="card stat-card"><div class="stat-icon" style="background:var(--success-50)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--success-600)" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><div><div class="stat-value">${healthy}</div><div class="stat-label">Healthy Animals</div></div></div>
          <div class="card stat-card"><div class="stat-icon" style="background:var(--warning-50)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--warning-600)" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div><div class="stat-value">${livestock.length}</div><div class="stat-label">Total Groups</div></div></div>
        `;

        // Cards
        if (livestock.length === 0) {
          document.getElementById('livestockList').innerHTML = emptyState('No livestock added yet', 'Start tracking your animals by adding your first livestock group.', null, null);
        } else {
          document.getElementById('livestockList').innerHTML = `
            <div class="grid grid-3">
              ${livestock.map(item => `
                <div class="card card-hover" style="padding:0;overflow:hidden">
                  ${item.image
                    ? `<img src="${item.image}" alt="${item.name}" style="width:100%;height:160px;object-fit:cover" />`
                    : `<div style="width:100%;height:160px;background:var(--primary-50);display:flex;align-items:center;justify-content:center;font-size:3rem;opacity:0.2">🐄</div>`}
                  <div style="padding:1rem">
                    <div class="flex-between mb-1">
                      <h4 style="font-size:1rem">${item.name}</h4>
                      <span class="badge ${item.health==='Healthy'?'badge-success':item.health==='Sick'?'badge-error':'badge-warning'}">${item.health}</span>
                    </div>
                    <p class="text-sm text-soft">${item.type} · ${item.breed || 'Unknown breed'}</p>
                    <p class="text-sm text-muted mt-1">Count: <strong>${item.count}</strong> animals</p>
                    ${item.notes ? `<p class="text-sm text-soft mt-1" style="border-top:1px solid var(--border);padding-top:0.5rem">${item.notes}</p>` : ''}
                    <div class="flex gap-1 mt-2">
                      <button class="btn btn-ghost btn-sm" onclick="editLivestock(${item.id})">Edit</button>
                      <button class="btn btn-ghost btn-sm" style="color:var(--error-500)" onclick="deleteLivestock(${item.id})">Delete</button>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          `;
        }
      }

      function openModal() {
        document.getElementById('editId').value = '';
        document.getElementById('modalTitle').textContent = 'Add Livestock';
        document.getElementById('livestockName').value = '';
        document.getElementById('livestockType').value = 'Cattle';
        document.getElementById('livestockBreed').value = '';
        document.getElementById('livestockCount').value = '';
        document.getElementById('livestockHealth').value = 'Healthy';
        document.getElementById('livestockNotes').value = '';
        currentImageData = '';
        resetImageUpload();
        document.getElementById('livestockModal').classList.add('show');
      }

      function closeModal() {
        document.getElementById('livestockModal').classList.remove('show');
      }

      function editLivestock(id) {
        const livestock = Store.livestock();
        const item = livestock.find(l => l.id === id);
        if (!item) return;
        document.getElementById('editId').value = item.id;
        document.getElementById('modalTitle').textContent = 'Edit Livestock';
        document.getElementById('livestockName').value = item.name;
        document.getElementById('livestockType').value = item.type || 'Cattle';
        document.getElementById('livestockBreed').value = item.breed || '';
        document.getElementById('livestockCount').value = item.count;
        document.getElementById('livestockHealth').value = item.health || 'Healthy';
        document.getElementById('livestockNotes').value = item.notes || '';
        currentImageData = item.image || '';
        if (currentImageData) {
          document.getElementById('imgPlaceholder').style.display = 'none';
          document.getElementById('imgPreview').style.display = 'block';
          document.getElementById('imgPreviewEl').src = currentImageData;
        } else {
          resetImageUpload();
        }
        document.getElementById('livestockModal').classList.add('show');
      }

      function deleteLivestock(id) {
        if (!confirm('Delete this livestock record?')) return;
        Store.saveLivestock(Store.livestock().filter(l => l.id !== id));
        toast('Livestock deleted');
        renderLivestock();
      }

      function saveLivestock(e) {
        e.preventDefault();
        const livestock = Store.livestock();
        const editId = document.getElementById('editId').value;
        const data = {
          name: document.getElementById('livestockName').value,
          type: document.getElementById('livestockType').value,
          breed: document.getElementById('livestockBreed').value,
          count: parseInt(document.getElementById('livestockCount').value),
          health: document.getElementById('livestockHealth').value,
          notes: document.getElementById('livestockNotes').value,
          image: currentImageData || '',
        };
        if (editId) {
          const item = livestock.find(l => l.id === parseInt(editId));
          Object.assign(item, data);
          toast('Livestock updated');
        } else {
          data.id = Date.now();
          livestock.push(data);
          toast('Livestock added');
        }
        Store.saveLivestock(livestock);
        closeModal();
        renderLivestock();
      }

      // ---- Image upload ----
      function handleImageUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) {
          toast('Image too large. Max 2MB.');
          return;
        }
        const reader = new FileReader();
        reader.onload = function(ev) {
          currentImageData = ev.target.result;
          document.getElementById('imgPlaceholder').style.display = 'none';
          document.getElementById('imgPreview').style.display = 'block';
          document.getElementById('imgPreviewEl').src = currentImageData;
        };
        reader.readAsDataURL(file);
      }

      function removeImage(e) {
        e.stopPropagation();
        currentImageData = '';
        document.getElementById('livestockImage').value = '';
        resetImageUpload();
      }

      function resetImageUpload() {
        document.getElementById('imgPlaceholder').style.display = 'block';
        document.getElementById('imgPreview').style.display = 'none';
        document.getElementById('imgPreviewEl').src = '';
      }
    </script>
  </body>
</html>
