<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather — AgriMarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <script src="/main.js"></script>
    <script src="/farmer.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <script>
      const GHANA_REGIONS = {
        'Greater Accra': { lat: 5.6037, lon: -0.1870 },
        'Ashanti':      { lat: 6.6885, lon: -1.6244 },
        'Western':      { lat: 4.9047, lon: -1.7553 },
        'Eastern':      { lat: 6.0997, lon: -0.2466 },
        'Central':      { lat: 5.1216, lon: -1.2826 },
        'Northern':     { lat: 9.4035, lon: -0.8423 },
        'Volta':        { lat: 6.6111, lon: 0.4684 },
        'Brong-Ahafo':  { lat: 7.5467, lon: -1.9286 },
        'Upper East':   { lat: 10.7305, lon: -0.8423 },
        'Upper West':   { lat: 9.9400, lon: -2.5600 },
      };

      const content = `
        <div class="flex-between mb-3" style="flex-wrap:wrap;gap:1rem">
          <div>
            <p class="text-soft">Live weather forecast for your farm region</p>
          </div>
          <div class="flex gap-1 items-center">
            <label class="text-sm text-soft" style="white-space:nowrap">Region:</label>
            <select id="regionSelect" onchange="loadWeather()" style="padding:0.5rem 0.75rem;border:1px solid var(--border);border-radius:var(--radius);font-size:0.875rem;background:var(--white)">
              ${Object.keys(GHANA_REGIONS).map(r => `<option value="${r}">${r}</option>`).join('')}
            </select>
          </div>
        </div>

        <div id="weatherContent">
          <div class="card" style="text-align:center;padding:3rem 1rem">
            <div class="weather-loading" style="font-size:3rem;margin-bottom:1rem">🌤️</div>
            <p class="text-soft">Loading weather data…</p>
          </div>
        </div>
      `;
      initFarmerPage('/pages/weather.html', 'Weather', content);

      const user = Auth.get();
      if (user.region && GHANA_REGIONS[user.region]) {
        document.getElementById('regionSelect').value = user.region;
      }
      loadWeather();

      async function loadWeather() {
        const region = document.getElementById('regionSelect').value;
        const { lat, lon } = GHANA_REGIONS[region];
        const container = document.getElementById('weatherContent');

        container.innerHTML = `
          <div class="card" style="text-align:center;padding:3rem 1rem">
            <div class="weather-loading" style="font-size:3rem;margin-bottom:1rem">🌤️</div>
            <p class="text-soft">Loading weather data…</p>
          </div>
        `;

        try {
          const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
            `&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m` +
            `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,uv_index_max` +
            `&timezone=Africa/Accra&forecast_days=7`;
          const res = await fetch(url);
          if (!res.ok) throw new Error('Weather fetch failed');
          const data = await res.json();
          renderWeather(data, region);
        } catch (err) {
          container.innerHTML = `
            <div class="card" style="text-align:center;padding:3rem 1rem">
              <div style="font-size:3rem;margin-bottom:1rem;opacity:0.3">⚠️</div>
              <h3 style="color:var(--text-soft)">Unable to load weather</h3>
              <p class="text-soft mt-1">Check your connection and try again.</p>
              <button class="btn btn-primary mt-2" onclick="loadWeather()">Retry</button>
            </div>
          `;
        }
      }

      function renderWeather(data, region) {
        const c = data.current;
        const d = data.daily;
        const container = document.getElementById('weatherContent');

        const wmo = c.weather_code;
        const icon = weatherIcon(wmo);
        const desc = weatherDesc(wmo);

        const today = d.time[0];

        container.innerHTML = `
          <!-- Current conditions -->
          <div class="card weather-hero mb-3" style="background:linear-gradient(135deg,var(--primary-700),var(--primary-500));color:#fff;overflow:hidden;position:relative">
            <div class="weather-hero-bg">${icon.svg}</div>
            <div style="position:relative;z-index:1">
              <div class="flex-between" style="flex-wrap:wrap;gap:1rem">
                <div>
                  <p style="color:rgba(255,255,255,0.8);font-size:0.85rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em">${region} · Current</p>
                  <div class="flex items-center gap-2 mt-1">
                    <span style="font-size:3.5rem;line-height:1">${icon.emoji}</span>
                    <div>
                      <div style="font-size:2.5rem;font-weight:700;font-family:var(--font-head)">${Math.round(c.temperature_2m)}°C</div>
                      <p style="color:rgba(255,255,255,0.85)">${desc}</p>
                    </div>
                  </div>
                </div>
                <div style="text-align:right">
                  <p style="color:rgba(255,255,255,0.7);font-size:0.8rem">${formatDateLong(today)}</p>
                  <p style="color:rgba(255,255,255,0.85);font-size:0.9rem;margin-top:0.25rem">Feels like ${Math.round(c.apparent_temperature)}°C</p>
                </div>
              </div>
            </div>
          </div>

          <!-- Current metrics -->
          <div class="grid grid-4 mb-3">
            <div class="card stat-card weather-metric">
              <div class="stat-icon" style="background:var(--primary-100)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--primary-600)" stroke-width="2" width="24" height="24"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg></div>
              <div><div class="stat-value">${c.relative_humidity_2m}%</div><div class="stat-label">Humidity</div></div>
            </div>
            <div class="card stat-card weather-metric">
              <div class="stat-icon" style="background:var(--accent-100)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-600)" stroke-width="2" width="24" height="24"><path d="M9.59 4.59A2 2 0 1111 8H2m10.66 5.66a2 2 0 11-2.83-2.83M22 8h-2.76a4 4 0 00-3.42 1.94l-1.82 3.12a4 4 0 01-3.42 1.94H2"/><circle cx="12" cy="12" r="0"/></svg></div>
              <div><div class="stat-value">${Math.round(c.wind_speed_10m)} km/h</div><div class="stat-label">Wind Speed</div></div>
            </div>
            <div class="card stat-card weather-metric">
              <div class="stat-icon" style="background:var(--success-50)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--success-600)" stroke-width="2" width="24" height="24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
              <div><div class="stat-value">${c.precipitation} mm</div><div class="stat-label">Precipitation</div></div>
            </div>
            <div class="card stat-card weather-metric">
              <div class="stat-icon" style="background:var(--warning-50)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--warning-600)" stroke-width="2" width="24" height="24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg></div>
              <div><div class="stat-value">${d.uv_index_max[0].toFixed(1)}</div><div class="stat-label">UV Index</div></div>
            </div>
          </div>

          <!-- 7-day forecast -->
          <div class="card mb-3">
            <h3 style="margin-bottom:1rem">7-Day Forecast</h3>
            <div class="weather-week" id="weekForecast"></div>
          </div>

          <!-- Farming advisory -->
          <div class="card weather-advisory">
            <div class="flex items-center gap-2 mb-1">
              <span style="font-size:1.5rem">🌾</span>
              <h3 style="margin:0">Farming Advisory</h3>
            </div>
            <p class="text-soft mt-1" id="advisoryText">${buildAdvisory(d, c)}</p>
          </div>
        `;

        const weekEl = document.getElementById('weekForecast');
        if (weekEl) {
          weekEl.innerHTML = d.time.map((day, i) => {
            const di = weatherIcon(d.weather_code[i]);
            const dayName = i === 0 ? 'Today' : new Date(day).toLocaleDateString('en-GH', { weekday: 'short' });
            const maxTemp = Math.round(d.temperature_2m_max[i]);
            const minTemp = Math.round(d.temperature_2m_min[i]);
            const rainProb = d.precipitation_probability_max[i] || 0;
            return `
              <div class="weather-day ${i === 0 ? 'today' : ''}">
                <div class="weather-day-name">${dayName}</div>
                <div class="weather-day-icon">${di.emoji}</div>
                <div class="weather-day-desc">${weatherDesc(d.weather_code[i])}</div>
                <div class="weather-day-temps">
                  <span class="temp-max">${maxTemp}°</span>
                  <span class="temp-min">${minTemp}°</span>
                </div>
                <div class="weather-day-rain">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                  ${rainProb}%
                </div>
              </div>
            `;
          }).join('');
        }
      }

      function weatherIcon(code) {
        if (code === 0) return { emoji: '☀️', svg: '<svg viewBox="0 0 64 64" width="120" height="120" style="position:absolute;right:-10px;bottom:-20px;opacity:0.15"><circle cx="32" cy="32" r="16" fill="#fff"/><g stroke="#fff" stroke-width="3" stroke-linecap="round"><line x1="32" y1="4" x2="32" y2="12"/><line x1="32" y1="52" x2="32" y2="60"/><line x1="4" y1="32" x2="12" y2="32"/><line x1="52" y1="32" x2="60" y2="32"/><line x1="12" y1="12" x2="17" y2="17"/><line x1="47" y1="47" x2="52" y2="52"/><line x1="52" y1="12" x2="47" y2="17"/><line x1="12" y1="52" x2="17" y2="47"/></g></svg>' };
        if (code <= 2) return { emoji: '🌤️', svg: '<svg viewBox="0 0 64 64" width="120" height="120" style="position:absolute;right:-10px;bottom:-20px;opacity:0.15"><circle cx="24" cy="24" r="12" fill="#fff"/><path d="M28 44a10 10 0 0110-10 8 8 0 00-16-2 6 6 0 00-2 12z" fill="#fff" opacity="0.6"/></svg>' };
        if (code <= 3) return { emoji: '⛅', svg: '<svg viewBox="0 0 64 64" width="120" height="120" style="position:absolute;right:-10px;bottom:-20px;opacity:0.15"><path d="M20 36a12 12 0 0112-12 10 10 0 00-20-2 8 8 0 00-2 16z" fill="#fff"/><path d="M36 44a10 10 0 0110-10 8 8 0 00-16-2 6 6 0 00-2 12z" fill="#fff" opacity="0.5"/></svg>' };
        if (code <= 48) return { emoji: '🌫️', svg: '<svg viewBox="0 0 64 64" width="120" height="120" style="position:absolute;right:-10px;bottom:-20px;opacity:0.1"><rect x="8" y="28" width="48" height="8" rx="4" fill="#fff"/><rect x="12" y="40" width="40" height="6" rx="3" fill="#fff"/></svg>' };
        if (code <= 57) return { emoji: '🌧️', svg: '<svg viewBox="0 0 64 64" width="120" height="120" style="position:absolute;right:-10px;bottom:-20px;opacity:0.15"><path d="M20 32a12 12 0 0112-12 10 10 0 00-20-2 8 8 0 00-2 16z" fill="#fff"/><g fill="#fff"><circle cx="22" cy="42" r="2"/><circle cx="32" cy="48" r="2"/><circle cx="42" cy="42" r="2"/></g></svg>' };
        if (code <= 67) return { emoji: '🌧️', svg: '<svg viewBox="0 0 64 64" width="120" height="120" style="position:absolute;right:-10px;bottom:-20px;opacity:0.15"><path d="M20 32a12 12 0 0112-12 10 10 0 00-20-2 8 8 0 00-2 16z" fill="#fff"/><g fill="#fff"><circle cx="20" cy="44" r="2"/><circle cx="28" cy="50" r="2"/><circle cx="36" cy="44" r="2"/><circle cx="44" cy="50" r="2"/></g></svg>' };
        if (code <= 77) return { emoji: '🌨️', svg: '<svg viewBox="0 0 64 64" width="120" height="120" style="position:absolute;right:-10px;bottom:-20px;opacity:0.15"><path d="M20 30a12 12 0 0112-12 10 10 0 00-20-2 8 8 0 00-2 16z" fill="#fff"/><g fill="#fff"><circle cx="22" cy="44" r="2"/><circle cx="34" cy="50" r="2"/><circle cx="42" cy="44" r="2"/></g></svg>' };
        if (code <= 82) return { emoji: '🌦️', svg: '<svg viewBox="0 0 64 64" width="120" height="120" style="position:absolute;right:-10px;bottom:-20px;opacity:0.15"><circle cx="22" cy="22" r="10" fill="#fff"/><path d="M28 38a10 10 0 0110-10 8 8 0 00-16-2 6 6 0 00-2 12z" fill="#fff" opacity="0.6"/><g fill="#fff"><circle cx="28" cy="48" r="2"/><circle cx="38" cy="52" r="2"/></g></svg>' };
        if (code <= 86) return { emoji: '🌨️', svg: '<svg viewBox="0 0 64 64" width="120" height="120" style="position:absolute;right:-10px;bottom:-20px;opacity:0.15"><path d="M20 30a12 12 0 0112-12 10 10 0 00-20-2 8 8 0 00-2 16z" fill="#fff"/><g fill="#fff"><circle cx="22" cy="44" r="2"/><circle cx="34" cy="50" r="2"/><circle cx="42" cy="44" r="2"/></g></svg>' };
        if (code >= 95) return { emoji: '⛈️', svg: '<svg viewBox="0 0 64 64" width="120" height="120" style="position:absolute;right:-10px;bottom:-20px;opacity:0.15"><path d="M20 28a12 12 0 0112-12 10 10 0 00-20-2 8 8 0 00-2 16z" fill="#fff"/><path d="M32 36l-4 8h6l-4 10" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>' };
        return { emoji: '☁️', svg: '<svg viewBox="0 0 64 64" width="120" height="120" style="position:absolute;right:-10px;bottom:-20px;opacity:0.1"><path d="M20 36a12 12 0 0112-12 10 10 0 00-20-2 8 8 0 00-2 16z" fill="#fff"/></svg>' };
      }

      function weatherDesc(code) {
        if (code === 0) return 'Clear sky';
        if (code <= 2) return 'Partly cloudy';
        if (code === 3) return 'Overcast';
        if (code <= 48) return 'Foggy';
        if (code <= 57) return 'Light drizzle';
        if (code <= 67) return 'Rainy';
        if (code <= 77) return 'Snowfall';
        if (code <= 82) return 'Rain showers';
        if (code <= 86) return 'Snow showers';
        if (code >= 95) return 'Thunderstorm';
        return 'Cloudy';
      }

      function buildAdvisory(d, c) {
        const rainToday = d.precipitation_sum[0] || 0;
        const rainProb = d.precipitation_probability_max[0] || 0;
        const uv = d.uv_index_max[0] || 0;
        const wind = c.wind_speed_10m || 0;
        const temp = c.temperature_2m;
        const humidity = c.relative_humidity_2m;

        const tips = [];

        if (rainToday > 5 || rainProb > 70) {
          tips.push('Heavy rain expected — delay any planned pesticide or fertilizer application to avoid runoff.');
        } else if (rainProb > 40) {
          tips.push('Moderate rain chance — good time to prepare drainage channels in your fields.');
        } else if (rainToday < 1 && rainProb < 20) {
          tips.push('Dry conditions — ensure your crops are adequately irrigated, especially young seedlings.');
        }

        if (uv > 7) {
          tips.push('Very high UV index — if working outdoors, wear protective clothing and avoid midday sun exposure.');
        } else if (uv > 5) {
          tips.push('High UV index — consider shade for workers and livestock during peak hours.');
        }

        if (wind > 25) {
          tips.push('Strong winds — secure loose equipment and protect young plants from wind damage.');
        }

        if (humidity > 80) {
          tips.push('High humidity — monitor crops for fungal diseases and ensure proper ventilation for stored produce.');
        } else if (humidity < 40) {
          tips.push('Low humidity — increase watering frequency and mulch to retain soil moisture.');
        }

        if (temp > 35) {
          tips.push('Extreme heat — provide extra shade and water for livestock, and avoid field work during midday.');
        } else if (temp < 20) {
          tips.push('Cool temperatures — sensitive crops may need protection; monitor for cold stress.');
        }

        if (tips.length === 0) {
          tips.push('Weather conditions are favorable for normal farm operations. Good time for planting, harvesting, or field maintenance.');
        }

        return tips.join(' ');
      }

      function formatDateLong(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-GH', { weekday: 'long', month: 'long', day: 'numeric' });
      }
    </script>
  </body>
</html>
