<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Confirmed — AgriMarket Ghana</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <script src="/main.js"></script>
  </head>
  <body>
    <div id="nav"></div>

    <section class="container" style="padding:2rem 1rem;max-width:800px">
      <div id="confirmContent"></div>
    </section>

    <div id="footer"></div>

    <script>
      mountLayout('marketplace');

      const params = new URLSearchParams(window.location.search);
      const orderId = parseInt(params.get('id'));
      const order = Store.orders().find(o => o.id === orderId);

      if (!order) {
        document.getElementById('confirmContent').innerHTML = emptyState('Order not found', 'We couldn\'t find this order. Please check your order ID.', '/pages/marketplace.html', 'Browse Marketplace');
      } else {
        const agent = order.deliveryAgent || {};
        document.getElementById('confirmContent').innerHTML = `
          <div class="card text-center mb-3" style="border-color:var(--success-100);background:var(--success-50)">
            <div style="width:72px;height:72px;border-radius:50%;background:var(--success-500);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" width="36" height="36"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h2 style="margin-bottom:0.5rem">Order Confirmed!</h2>
            <p class="text-soft">Thank you, ${order.customerName || 'valued customer'}. Your order has been placed and is being processed.</p>
          </div>

          <div class="card mb-3">
            <div class="flex-between mb-2" style="flex-wrap:wrap;gap:0.5rem">
              <div>
                <h3 style="margin-bottom:0.25rem">Order #${order.orderNumber || order.id}</h3>
                <p class="text-sm text-soft">Placed on ${order.date || ''}</p>
              </div>
              <span class="badge badge-warning">${order.status || 'Pending'}</span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem" class="confirm-grid">
              <div>
                <p class="text-sm text-soft" style="margin-bottom:0.25rem">Tracking Number</p>
                <p style="font-weight:600;font-family:monospace">${order.trackingNumber || 'N/A'}</p>
              </div>
              <div>
                <p class="text-sm text-soft" style="margin-bottom:0.25rem">Estimated Delivery</p>
                <p style="font-weight:600">${order.estimatedDelivery || 'TBD'}</p>
              </div>
              <div>
                <p class="text-sm text-soft" style="margin-bottom:0.25rem">Payment Method</p>
                <p style="font-weight:600">${order.paymentMethod || 'N/A'}</p>
              </div>
              <div>
                <p class="text-sm text-soft" style="margin-bottom:0.25rem">Total Amount</p>
                <p style="font-weight:700;color:var(--primary-600)">${fmtMoney(order.total || 0)}</p>
              </div>
            </div>
          </div>

          ${agent.name ? `
          <div class="card mb-3">
            <h4 style="margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem">
              <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary-600)" stroke-width="2" width="20" height="20"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M20 8v6M23 11h-6"/></svg>
              Your Delivery Agent
            </h4>
            <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
              <div class="avatar avatar-lg" style="background:var(--primary-100);color:var(--primary-700)">${agent.name.charAt(0)}</div>
              <div style="flex:1;min-width:200px">
                <h4 style="margin-bottom:0.25rem">${agent.name}</h4>
                <p class="text-sm text-soft">${agent.vehicle} · ${agent.region} Region · ${agent.rating} ★</p>
                <p class="text-sm mt-1">
                  <a href="tel:${agent.phone}" style="display:inline-flex;align-items:center;gap:0.3rem">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
                    ${agent.phone}
                  </a>
                </p>
              </div>
            </div>
          </div>
          ` : ''}

          <div class="card mb-3">
            <h4 style="margin-bottom:0.75rem;display:flex;align-items:center;gap:0.5rem">
              <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary-600)" stroke-width="2" width="20" height="20"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
              Delivery Address
            </h4>
            <p>${order.customerName || ''}</p>
            <p class="text-soft">${order.address || ''}</p>
            <p class="text-soft">${order.city || ''}, ${order.region || ''}</p>
            <p class="text-soft">${order.phone || ''}</p>
          </div>

          ${order.items && order.items.length > 0 ? `
          <div class="card mb-3">
            <h4 style="margin-bottom:0.75rem">Order Items (${order.items.length})</h4>
            <div class="table-wrap"><table>
              <thead><tr><th>Product</th><th>Qty</th><th>Price</th><th>Subtotal</th></tr></thead>
              <tbody>
                ${order.items.map(item => {
                  const p = PRODUCTS.find(pr => pr.id === item.id);
                  const name = p ? p.name : item.name || 'Product';
                  const price = p ? p.price : item.price || 0;
                  return `<tr><td>${name}</td><td>${item.qty || 1}</td><td>${fmtMoney(price)}</td><td style="font-weight:600">${fmtMoney(price * (item.qty || 1))}</td></tr>`;
                }).join('')}
              </tbody>
            </table></div>
            <div class="summary-total">
              <span>Total</span>
              <span style="color:var(--primary-600)">${fmtMoney(order.total || 0)}</span>
            </div>
          </div>
          ` : ''}

          <div class="card mb-3" style="background:var(--primary-50);border-color:var(--primary-200)">
            <div style="display:flex;align-items:flex-start;gap:0.75rem">
              <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary-600)" stroke-width="2" width="24" height="24" style="flex-shrink:0;margin-top:2px"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <div>
                <p style="font-weight:600;margin-bottom:0.25rem">Order Confirmation Sent</p>
                <p class="text-sm text-soft">A confirmation email has been sent to ${order.email || 'your email'}. You'll receive updates as your order progresses through each delivery stage.</p>
              </div>
            </div>
          </div>

          <div class="flex gap-1" style="flex-wrap:wrap">
            <a href="/pages/order-tracking.html?id=${order.id}" class="btn btn-primary btn-lg">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
              Track This Order
            </a>
            <a href="/pages/marketplace.html" class="btn btn-outline btn-lg">Continue Shopping</a>
          </div>
        `;
      }
    </script>

    <style>
      @media(max-width:600px){.confirm-grid{grid-template-columns:1fr !important}}
    </style>
  </body>
</html>
